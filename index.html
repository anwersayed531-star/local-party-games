    <!--
      ============================================================
      ADS SDK — auto-detected by URL parameter or build env
      ============================================================
      Usage:
        - Default build: NO ads SDK loaded (safe for itch.io / GameMonetize HTML5).
        - Poki build:    add  ?sdk=poki        (or rename index-poki.html)
        - CrazyGames:    add  ?sdk=crazygames  (or rename index-crazygames.html)
        - GameMonetize:  add  ?sdk=gm
      The script below loads the right SDK before the app starts so
      adsSDK.ts can detect window.PokiSDK / window.CrazyGames / window.sdk.
      ============================================================
    -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          var sdk = p.get("sdk") || (window.__ADS_PROVIDER__ || "");
          var src = null;
          if (sdk === "poki")          src = "https://game-cdn.poki.com/scripts/v2/poki-sdk.js";
          else if (sdk === "crazygames") src = "https://sdk.crazygames.com/crazygames-sdk-v3.js";
          else if (sdk === "gm")       src = "https://api.gamemonetize.com/sdk.js";
          if (src) {
            var s = document.createElement("script");
            s.src = src;
            s.async = false;
            document.head.appendChild(s);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
